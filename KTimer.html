<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTimer - PrasertCBS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .timer-display {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Roboto Mono', monospace;
            font-variant-numeric: tabular-nums;
            font-size: clamp(3rem, 15vw, 10rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1;
        }
        .timer-display.alerting {
            animation: pulse-alert 1s ease-in-out infinite;
        }
        @keyframes pulse-alert {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.85; }
            100% { transform: scale(1); opacity: 1; }
        }
        .display-clock {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%) !important;
        }
        .display-clock .timer-display {
            color: #fbbf24 !important;
        }
        .time-picker {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
        }
        .time-picker-col {
            position: relative;
            height: 140px;
            width: 80px;
            overflow: hidden;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .time-picker-scroll {
            height: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 54px 0;
        }
        .time-picker-scroll::-webkit-scrollbar {
            display: none;
        }
        .time-picker-item {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            color: rgba(148, 163, 184, 0.4);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .time-picker-item.selected {
            color: #f97316;
        }
        .time-picker-col::before,
        .time-picker-col::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 54px;
            pointer-events: none;
            z-index: 10;
        }
        .time-picker-col::before {
            top: 0;
            background: linear-gradient(to bottom, rgba(30, 41, 59, 0.9), transparent);
        }
        .time-picker-col::after {
            bottom: 0;
            background: linear-gradient(to top, rgba(30, 41, 59, 0.9), transparent);
        }
        .time-picker-highlight {
            position: absolute;
            top: 54px;
            left: 4px;
            right: 4px;
            height: 32px;
            border: 2px solid rgba(249, 115, 22, 0.3);
            border-radius: 8px;
            background: rgba(249, 115, 22, 0.1);
            pointer-events: none;
        }
        .time-picker-separator {
            font-size: 2rem;
            font-weight: 700;
            color: #f97316;
            padding: 0 0.25rem;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">
    <div class="relative overflow-hidden min-h-screen">
        <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950"></div>
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-orange-500/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-500/20 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-orange-500/10 rounded-full blur-3xl"></div>
        
        <div class="relative z-10 flex flex-col min-h-screen">
            <nav class="container mx-auto px-6 py-6">
                <div class="flex items-center justify-center">
                    <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center shadow-lg shadow-brand-500/25">
                            <i class="fa-solid fa-graduation-cap text-white text-lg"></i>
                        </div>
                        <span class="text-xl font-bold text-white">PrasertCBS</span>

            <header class="container mx-auto px-6 pt-4 pb-6 text-center">

                    <span class="gradient-text">Timer & Stopwatch</span>
                </h1>
                <p class="text-slate-400 max-w-xl mx-auto">Professional countdown timer and stopwatch for classroom activities.</p>
            </header>

            <main class="container mx-auto px-6 pb-16 flex-grow">
                <div class="max-w-4xl mx-auto space-y-6">
                    
                    <div id="display" class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-8 min-h-[200px] flex items-center justify-center relative overflow-hidden transition-all duration-300">
                        <div class="absolute inset-0 bg-gradient-to-br from-orange-500/5 to-transparent"></div>
                        <div id="readout" class="timer-display text-orange-400 relative z-10" role="timer" aria-live="polite" aria-atomic="true" aria-label="Time remaining">00:00</div>
                    </div>

                    <div class="grid gap-6 lg:grid-cols-2">
                        <div class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-6">
                            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                <i class="fa-solid fa-clock text-orange-400"></i>Deadline Timer
                            </h2>
                            
                            <div class="space-y-4">
                                <label class="block text-sm text-slate-400 mb-2 text-center">Set deadline</label>
                                <div class="time-picker">
                                    <div class="time-picker-col">
                                        <div class="time-picker-highlight"></div>
                                        <div class="time-picker-scroll" id="hourScroll"></div>
                                    </div>
                                    <span class="time-picker-separator">:</span>
                                    <div class="time-picker-col">
                                        <div class="time-picker-highlight"></div>
                                        <div class="time-picker-scroll" id="minuteScroll"></div>
                                    </div>
                                    <div class="time-picker-col" style="width: 70px;">
                                        <div class="time-picker-highlight"></div>
                                        <div class="time-picker-scroll" id="ampmScroll"></div>

                                </div>
                                
                                <div class="flex gap-2">
                                    <button id="startDeadline" class="flex-1 px-4 py-3 bg-gradient-to-r from-orange-500 to-orange-600 rounded-xl font-semibold text-white hover:shadow-lg hover:shadow-orange-500/25 hover:-translate-y-0.5 transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0">
                                        <i class="fa-solid fa-play mr-2"></i>Start
                                    </button>
                                    <button id="showCurrentTimeBtn" class="px-4 py-3 bg-white/5 border border-white/10 rounded-xl font-medium text-slate-300 hover:bg-white/10 transition-all" title="Toggle between countdown and current time">
                                        <i class="fa-solid fa-clock"></i>

                                </div>
                            </div>

                            <div id="error" class="mt-3 text-rose-400 text-sm"></div>
                        </div>

                        <div class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-6">
                            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                <i class="fa-solid fa-hourglass-half text-orange-400"></i>Quick Timer
                            </h2>
                            
                            <div class="space-y-4">
                                <div class="flex gap-2">
                                    <input id="minutesInput" type="number" min="1" max="999" value="5" class="w-24 bg-slate-800/50 border border-white/10 rounded-xl px-4 py-3 text-slate-200 text-center focus:outline-none focus:border-orange-500/50 focus:ring-2 focus:ring-orange-500/20 transition-all">
                                    <span class="flex items-center text-slate-400">minutes</span>
                                    <button id="setMinutesBtn" class="flex-1 px-4 py-3 bg-white/5 border border-white/10 rounded-xl font-medium text-slate-300 hover:bg-white/10 transition-all">
                                        <i class="fa-solid fa-play mr-2"></i>Set
                                    </button>
                                </div>

                                <div>
                                    <label class="block text-sm text-slate-400 mb-2">Presets</label>
                                    <div class="flex flex-wrap gap-2" id="presets">
                                        <button class="px-3 py-2 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-slate-300 hover:bg-orange-500/20 hover:border-orange-500/30 hover:text-orange-300 transition-all" data-seconds="30">30s</button>
                                        <button class="px-3 py-2 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-slate-300 hover:bg-orange-500/20 hover:border-orange-500/30 hover:text-orange-300 transition-all" data-seconds="60">1m</button>
                                        <button class="px-3 py-2 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-slate-300 hover:bg-orange-500/20 hover:border-orange-500/30 hover:text-orange-300 transition-all" data-seconds="180">3m</button>
                                        <button class="px-3 py-2 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-slate-300 hover:bg-orange-500/20 hover:border-orange-500/30 hover:text-orange-300 transition-all" data-seconds="300">5m</button>
                                        <button class="px-3 py-2 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-slate-300 hover:bg-orange-500/20 hover:border-orange-500/30 hover:text-orange-300 transition-all" data-seconds="420">7m</button>
                                        <button class="px-3 py-2 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-slate-300 hover:bg-orange-500/20 hover:border-orange-500/30 hover:text-orange-300 transition-all" data-seconds="600">10m</button>
                                        <button class="px-3 py-2 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-slate-300 hover:bg-orange-500/20 hover:border-orange-500/30 hover:text-orange-300 transition-all" data-seconds="900">15m</button>
                                        <button class="px-3 py-2 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-slate-300 hover:bg-orange-500/20 hover:border-orange-500/30 hover:text-orange-300 transition-all" data-seconds="1200">20m</button>
                                        <button class="px-3 py-2 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-slate-300 hover:bg-orange-500/20 hover:border-orange-500/30 hover:text-orange-300 transition-all" data-seconds="1500">25m</button>
                                        <button class="px-3 py-2 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-slate-300 hover:bg-orange-500/20 hover:border-orange-500/30 hover:text-orange-300 transition-all" data-seconds="1800">30m</button>
                                        <button class="px-3 py-2 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-slate-300 hover:bg-orange-500/20 hover:border-orange-500/30 hover:text-orange-300 transition-all" data-seconds="3600">60m</button>
                                        <button class="px-3 py-2 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-slate-300 hover:bg-orange-500/20 hover:border-orange-500/30 hover:text-orange-300 transition-all" data-seconds="5400">90m</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-6">
                        <div class="flex flex-wrap items-center justify-between gap-4">
                            <label class="flex items-center gap-2 text-sm text-slate-400 cursor-pointer">
                                <input id="chimeToggle" type="checkbox" class="w-4 h-4 accent-orange-500 rounded">
                                <i class="fa-solid fa-bell text-orange-400"></i>
                                Play chime when done
                            </label>
                            <button id="stopBtn" class="hidden px-6 py-2.5 bg-gradient-to-r from-rose-500 to-rose-600 rounded-xl font-semibold text-white hover:shadow-lg hover:shadow-rose-500/25 transition-all">
                                <i class="fa-solid fa-stop mr-2"></i>Stop / Reset
                            </button>
                        </div>

                </div>
            </main>

            <footer class="border-t border-white/5 mt-auto">
                <div class="container mx-auto px-6 py-6">
                    <div class="flex items-center justify-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center">
                            <i class="fa-solid fa-graduation-cap text-white text-sm"></i>
                        </div>
                        <span class="text-slate-400 text-sm">&copy; 2025 PrasertCBS. All rights reserved.</span>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <audio id="chimeAudio" src="chime.mp3" preload="auto" aria-hidden="true"></audio>

    <script>
        (function(){
            const readout = document.getElementById('readout');
            const display = document.getElementById('display');
            const startDeadlineBtn = document.getElementById('startDeadline');
            const stopBtn = document.getElementById('stopBtn');
            const showCurrentTimeBtn = document.getElementById('showCurrentTimeBtn');
            const presetsWrap = document.getElementById('presets');
            const errorEl = document.getElementById('error');
            const chimeToggle = document.getElementById('chimeToggle');
            const chimeAudio = document.getElementById('chimeAudio');
            const minutesInput = document.getElementById('minutesInput');
            const setMinutesBtn = document.getElementById('setMinutesBtn');
            const hourScroll = document.getElementById('hourScroll');
            const minuteScroll = document.getElementById('minuteScroll');
            const ampmScroll = document.getElementById('ampmScroll');

            const ALERT_THRESHOLD_SECONDS = 10;
            const CHIME_REPEAT_COUNT = 3;

            const MODE_IDLE = 'idle';
            const MODE_COUNTDOWN = 'countdown';
            const MODE_CLOCK = 'clock';

            let mode = MODE_IDLE;
            let rafId = null;
            let endEpochMs = null;
            let lastWhole = null;
            let clockIntervalId = null;
            let chimeRepeatsRemaining = 0;
            let showCountdown = true;

            // Initialize time picker
            function initTimePicker() {
                // Hours 1-12
                for (let h = 1; h <= 12; h++) {
                    const item = document.createElement('div');
                    item.className = 'time-picker-item';
                    item.textContent = String(h).padStart(2, '0');
                    item.dataset.value = h;
                    hourScroll.appendChild(item);
                }
                
                // Minutes 00-59
                for (let m = 0; m < 60; m++) {
                    const item = document.createElement('div');
                    item.className = 'time-picker-item';
                    item.textContent = String(m).padStart(2, '0');
                    item.dataset.value = m;
                    minuteScroll.appendChild(item);
                }
                
                // AM/PM
                ['AM', 'PM'].forEach(ap => {
                    const item = document.createElement('div');
                    item.className = 'time-picker-item';
                    item.textContent = ap;
                    item.dataset.value = ap;
                    ampmScroll.appendChild(item);
                });

                // Set current time as default
                const now = new Date();
                let hours = now.getHours();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                const minutes = now.getMinutes();

                scrollToValue(hourScroll, hours);
                scrollToValue(minuteScroll, minutes);
                scrollToValue(ampmScroll, ampm);

                // Add scroll listeners
                [hourScroll, minuteScroll, ampmScroll].forEach(scroll => {
                    scroll.addEventListener('scroll', () => updateSelectedItems(scroll));
                });
            }

            function scrollToValue(scrollEl, value) {
                const items = scrollEl.querySelectorAll('.time-picker-item');
                items.forEach((item, index) => {
                    if (item.dataset.value == value || item.dataset.value === String(value)) {
                        scrollEl.scrollTop = index * 32;
                    }
                });
                updateSelectedItems(scrollEl);
            }

            function updateSelectedItems(scrollEl) {
                const scrollTop = scrollEl.scrollTop;
                const selectedIndex = Math.round(scrollTop / 32);
                const items = scrollEl.querySelectorAll('.time-picker-item');
                items.forEach((item, index) => {
                    item.classList.toggle('selected', index === selectedIndex);
                });
            }

            function getSelectedValue(scrollEl) {
                const scrollTop = scrollEl.scrollTop;
                const selectedIndex = Math.round(scrollTop / 32);
                const items = scrollEl.querySelectorAll('.time-picker-item');
                if (items[selectedIndex]) {
                    return items[selectedIndex].dataset.value;
                }
                return null;
            }

            function getSelectedTime() {
                const hour = parseInt(getSelectedValue(hourScroll));
                const minute = parseInt(getSelectedValue(minuteScroll));
                const ampm = getSelectedValue(ampmScroll);
                return { hour, minute, ampm };
            }

            function setTimePickerEnabled(enabled) {
                [hourScroll, minuteScroll, ampmScroll].forEach(scroll => {
                    scroll.style.pointerEvents = enabled ? 'auto' : 'none';
                    scroll.style.opacity = enabled ? '1' : '0.5';
                });
            }

            function clamp(n, min, max){ return Math.min(max, Math.max(min, n)); }

            function formatDuration(totalSec){
                const s = clamp(Math.floor(totalSec), 0, 359999);
                if (s >= 3600) {
                    const hrs = Math.floor(s / 3600);
                    const mins = Math.floor((s % 3600) / 60);
                    const secs = s % 60;
                    return String(hrs).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
                } else {
                    const mins = Math.floor(s / 60);
                    const secs = s % 60;
                    return String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
                }
            }

            function getTimeFromPicker() {
                const { hour, minute, ampm } = getSelectedTime();
                let h = hour;
                if (ampm === 'PM' && h !== 12) h += 12;
                if (ampm === 'AM' && h === 12) h = 0;
                
                const now = new Date();
                const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, minute, 0, 0);
                if (target <= now) target.setDate(target.getDate() + 1);
                return target;
            }

            function setError(msg){ errorEl.textContent = msg || ''; }

            function updateReadoutAppearance(whole){
                readout.classList.toggle('alerting', whole <= ALERT_THRESHOLD_SECONDS);
                if (whole <= ALERT_THRESHOLD_SECONDS) {
                    readout.classList.remove('text-orange-400', 'text-amber-400');
                    readout.classList.add('text-rose-400');
                } else if (whole > ALERT_THRESHOLD_SECONDS && whole < 60) {
                    readout.classList.remove('text-orange-400', 'text-rose-400');
                    readout.classList.add('text-amber-400');
                } else {
                    readout.classList.remove('text-amber-400', 'text-rose-400');
                    readout.classList.add('text-orange-400');
                }
            }

            function stopChime(){
                if(!chimeAudio) return;
                chimeAudio.pause();
                chimeAudio.currentTime = 0;
                chimeRepeatsRemaining = 0;
                chimeAudio.removeEventListener('ended', handleChimeEnded);
            }

            function playChimeIfEnabled(){
                if(!chimeAudio || !chimeToggle || !chimeToggle.checked) return;
                chimeAudio.removeEventListener('ended', handleChimeEnded);
                chimeRepeatsRemaining = Math.max(0, CHIME_REPEAT_COUNT - 1);
                chimeAudio.currentTime = 0;
                const maybePlay = chimeAudio.play();
                if(maybePlay && typeof maybePlay.catch === 'function'){
                    maybePlay.catch(()=>{});
                }
                if(chimeRepeatsRemaining > 0){
                    chimeAudio.addEventListener('ended', handleChimeEnded);
                }
            }

            function handleChimeEnded(){
                if(!chimeAudio) return;
                if(chimeRepeatsRemaining <= 0){
                    chimeAudio.removeEventListener('ended', handleChimeEnded);
                    return;
                }
                chimeRepeatsRemaining -= 1;
                chimeAudio.currentTime = 0;
                const maybePlay = chimeAudio.play();
                if(maybePlay && typeof maybePlay.catch === 'function'){
                    maybePlay.catch(()=>{});
                }
                if(chimeRepeatsRemaining <= 0){
                    chimeAudio.removeEventListener('ended', handleChimeEnded);
                }
            }

            function updateControlStates(){
                const isCountdown = mode === MODE_COUNTDOWN;
                const isClock = mode === MODE_CLOCK;
                const isActive = isCountdown || isClock;

                startDeadlineBtn.disabled = isActive;
                setTimePickerEnabled(!isActive);
                minutesInput.disabled = isActive;
                setMinutesBtn.disabled = isActive;
                Array.from(presetsWrap.querySelectorAll('button')).forEach(b => b.disabled = isActive);
                stopBtn.classList.toggle('hidden', !isActive);
                updateToggleBtnIcon();
            }

            function setMode(nextMode){
                mode = nextMode;
                updateControlStates();
            }

            function startDuration(seconds){
                stopClock();
                clearCountdown();
                stopChime();
                setError('');
                showCountdown = true;
                endEpochMs = Date.now() + Math.max(0, Math.floor(seconds))*1000;
                lastWhole = null;
                readout.classList.remove('alerting');
                readout.classList.remove('text-rose-400', 'text-amber-400');
                readout.classList.add('text-orange-400');
                display.classList.remove('display-clock');
                updateToggleBtnIcon();
                
                const initialWhole = Math.max(0, Math.floor(seconds));
                if(initialWhole <= 0){
                    readout.textContent = '00:00';
                    readout.setAttribute('aria-label', 'Time remaining 00:00');
                    readout.classList.remove('text-orange-400');
                    readout.classList.add('text-rose-400');
                    clearCountdown();
                    setMode(MODE_IDLE);
                    return;
                }
                const formatted = formatDuration(initialWhole);
                readout.textContent = formatted;
                readout.setAttribute('aria-label', `Time remaining ${formatted}`);
                updateReadoutAppearance(initialWhole);
                setMode(MODE_COUNTDOWN);
                tick();
            }

            function startDeadline(){
                if(mode !== MODE_IDLE) return;
                setError('');
                const target = getTimeFromPicker();
                const remaining = Math.ceil((target.getTime() - Date.now())/1000);
                if(remaining <= 0){ setError('That time has already passed.'); return; }
                startDuration(remaining);
            }

            function tick(){
                if(mode !== MODE_COUNTDOWN || !endEpochMs) return;
                const remainingMsRaw = endEpochMs - Date.now();
                if(remainingMsRaw <= 0){
                    readout.textContent = '00:00';
                    readout.setAttribute('aria-label', 'Time remaining 00:00');
                    readout.classList.remove('alerting');
                    readout.classList.remove('text-orange-400', 'text-amber-400');
                    readout.classList.add('text-rose-400');
                    playChimeIfEnabled();
                    clearCountdown();
                    setMode(MODE_IDLE);
                    display.classList.remove('display-clock');
                    showCountdown = true;
                    updateToggleBtnIcon();
                    return;
                }
                const whole = Math.ceil(remainingMsRaw / 1000);
                if(whole !== lastWhole){
                    lastWhole = whole;
                    updateDisplayBasedOnToggle();
                }
                if(mode === MODE_COUNTDOWN){
                    rafId = requestAnimationFrame(tick);
                }
            }

            function clearCountdown(){
                if(rafId){
                    cancelAnimationFrame(rafId);
                }
                rafId = null;
                endEpochMs = null;
                lastWhole = null;
                readout.classList.remove('alerting');
            }

            function stopClock(){
                if(clockIntervalId !== null){
                    clearInterval(clockIntervalId);
                    clockIntervalId = null;
                }
            }

            function updateClockReadout(){
                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                const ss = String(now.getSeconds()).padStart(2, '0');
                readout.textContent = `${hh}:${mm}:${ss}`;
                readout.classList.remove('alerting', 'text-orange-400', 'text-amber-400', 'text-rose-400');
                readout.classList.add('text-amber-400');
                readout.setAttribute('aria-label', `Current time ${hh}:${mm}:${ss}`);
            }

            function updateDisplayBasedOnToggle(){
                if (mode === MODE_COUNTDOWN && endEpochMs) {
                    if (showCountdown) {
                        const remainingMsRaw = endEpochMs - Date.now();
                        const whole = Math.ceil(Math.max(0, remainingMsRaw) / 1000);
                        const formatted = formatDuration(whole);
                        readout.textContent = formatted;
                        readout.setAttribute('aria-label', `Time remaining ${formatted}`);
                        updateReadoutAppearance(whole);
                        display.classList.remove('display-clock');
                    } else {
                        updateClockReadout();
                        display.classList.add('display-clock');
                    }
                }
            }

            function toggleDisplayMode(){
                if (mode === MODE_COUNTDOWN) {
                    showCountdown = !showCountdown;
                    updateDisplayBasedOnToggle();
                    updateToggleBtnIcon();
                } else if (mode === MODE_IDLE) {
                    startClock();
                }
            }

            function updateToggleBtnIcon(){
                if (mode === MODE_COUNTDOWN) {
                    showCurrentTimeBtn.innerHTML = showCountdown 
                        ? '<i class="fa-solid fa-clock"></i>' 
                        : '<i class="fa-solid fa-hourglass-half"></i>';
                    showCurrentTimeBtn.title = showCountdown ? 'Show current time' : 'Show countdown';
                } else {
                    showCurrentTimeBtn.innerHTML = '<i class="fa-solid fa-clock"></i>';
                    showCurrentTimeBtn.title = 'Show current time';
                }
            }

            function startClock(){
                stopClock();
                clearCountdown();
                stopChime();
                setError('');
                setMode(MODE_CLOCK);
                display.classList.add('display-clock');
                updateClockReadout();
                clockIntervalId = window.setInterval(updateClockReadout, 1000);
                updateToggleBtnIcon();
            }

            function reset(){
                stopClock();
                clearCountdown();
                stopChime();
                setMode(MODE_IDLE);
                readout.textContent = '00:00';
                setError('');
                readout.setAttribute('aria-label', 'Time remaining 00:00');
                readout.classList.remove('text-rose-400', 'text-amber-400');
                readout.classList.add('text-orange-400');
                minutesInput.value = '5';
                showCountdown = true;
                display.classList.remove('display-clock');
                updateToggleBtnIcon();
            }

            startDeadlineBtn.addEventListener('click', startDeadline);
            stopBtn.addEventListener('click', reset);

            presetsWrap.addEventListener('click', (e)=>{
                const btn = e.target.closest('button[data-seconds]');
                if(!btn || mode !== MODE_IDLE) return;
                startDuration(parseInt(btn.dataset.seconds, 10));
            });

            setMinutesBtn.addEventListener('click', () => {
                if(mode !== MODE_IDLE) return;
                const minutes = parseInt(minutesInput.value, 10);
                if(isNaN(minutes) || minutes <= 0) {
                    setError('Please enter a valid number of minutes.');
                    return;
                }
                startDuration(minutes * 60);
            });

            minutesInput.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    setMinutesBtn.click();
                }
            });

            showCurrentTimeBtn.addEventListener('click', toggleDisplayMode);

            if(chimeToggle){
                chimeToggle.addEventListener('change', ()=>{
                    if(!chimeToggle.checked){
                        stopChime();
                    }
                });
            }

            initTimePicker();
            setMode(MODE_IDLE);
            updateToggleBtnIcon();
        })();
    </script>
</body>
</html>
