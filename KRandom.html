<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRandom - PrasertCBS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stage-text {
            font-size: clamp(2.5rem, 10vw, 8rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
        }
        .flip {
            animation: flip 0.35s ease-in-out;
        }
        @keyframes flip {
            0% { transform: rotateX(0deg); opacity: 0.85; }
            50% { transform: rotateX(85deg); opacity: 0.65; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }
        .winner {
            animation: pop 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes pop {
            0% { transform: scale(0.9); }
            55% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        @media (prefers-reduced-motion: reduce) {
            .flip, .winner { animation: none; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">
    <div class="relative overflow-hidden min-h-screen">
        <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950"></div>
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-emerald-500/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-500/20 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-emerald-500/10 rounded-full blur-3xl"></div>
        
        <div class="relative z-10">
            <nav class="container mx-auto px-6 py-6">
                <div class="flex items-center justify-center">
                    <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center shadow-lg shadow-brand-500/25">
                            <i class="fa-solid fa-graduation-cap text-white text-lg"></i>
                        </div>
                        <span class="text-xl font-bold text-white">PrasertCBS</span>
                    </a>
                </div>
            </nav>

            <header class="container mx-auto px-6 pt-4 pb-8 text-center">
                <h1 class="text-3xl md:text-5xl font-bold mb-3 leading-tight">
                    <span class="gradient-text">Random Name Picker</span>
                </h1>
                <p class="text-slate-400 max-w-xl mx-auto">Fair and random student selector for classroom participation.</p>
            </header>

            <main class="container mx-auto px-6 pb-16">
                <div class="max-w-5xl mx-auto space-y-6">
                    
                    <div class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-8 min-h-[280px] flex items-center justify-center relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/5 to-transparent"></div>
                        <div id="stageText" class="stage-text text-emerald-400 relative z-10 text-center px-4">Ready</div>
                    </div>

                    <div class="grid gap-6 lg:grid-cols-2">
                        <div class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-6">
                            <div class="flex items-center justify-between mb-4">
                                <h2 class="text-lg font-bold text-white flex items-center gap-2">
                                    <i class="fa-solid fa-list text-emerald-400"></i>Name Pool
                                </h2>
                                <div class="flex items-center gap-2 px-3 py-1.5 bg-emerald-500/20 rounded-lg">
                                    <span class="text-emerald-400 font-bold text-sm" id="poolCount">0</span>
                                    <span class="text-slate-400 text-sm">names</span>
                                </div>
                            </div>
                            <textarea id="poolTextarea" rows="6" placeholder="Enter one name per line..." class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-emerald-500/50 focus:ring-2 focus:ring-emerald-500/20 transition-all resize-none font-mono">one
two
three
four
five
six</textarea>
                            
                            <div class="flex flex-wrap gap-2 mt-4">
                                <button id="startBtn" class="flex-1 px-4 py-2.5 bg-gradient-to-r from-emerald-500 to-emerald-600 rounded-xl font-semibold text-white hover:shadow-lg hover:shadow-emerald-500/25 hover:-translate-y-0.5 transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0">
                                    <i class="fa-solid fa-play mr-2"></i>Start
                                </button>
                                <button id="stopBtn" class="px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl font-medium text-slate-300 hover:bg-white/10 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                                    <i class="fa-solid fa-stop mr-2"></i>Stop
                                </button>
                                <button id="shuffleBtn" class="px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl font-medium text-slate-300 hover:bg-white/10 transition-all">
                                    <i class="fa-solid fa-shuffle"></i>
                                </button>
                                <button id="undoBtn" class="px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl font-medium text-slate-300 hover:bg-white/10 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                                    <i class="fa-solid fa-rotate-left"></i>
                                </button>
                                <button id="resetBtn" class="px-4 py-2.5 bg-rose-500/20 border border-rose-500/30 rounded-xl font-medium text-rose-300 hover:bg-rose-500/30 transition-all">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>

                            <div class="flex flex-wrap items-center gap-4 mt-4 pt-4 border-t border-white/5">
                                <div class="flex items-center gap-2">
                                    <label class="text-sm text-slate-400">Duration</label>
                                    <input type="number" id="durationInput" min="1" max="60" value="4" class="w-16 bg-slate-800/50 border border-white/10 rounded-lg px-3 py-1.5 text-sm text-slate-200 text-center focus:outline-none focus:border-emerald-500/50">
                                    <span class="text-sm text-slate-500">s</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <label class="text-sm text-slate-400">Speed</label>
                                    <input type="number" id="speedInput" min="30" max="300" step="10" value="300" class="w-16 bg-slate-800/50 border border-white/10 rounded-lg px-3 py-1.5 text-sm text-slate-200 text-center focus:outline-none focus:border-emerald-500/50">
                                    <span class="text-sm text-slate-500">ms</span>
                                </div>
                                <label class="flex items-center gap-2 text-sm text-slate-400 cursor-pointer">
                                    <input type="checkbox" id="removeCheckbox" checked class="w-4 h-4 accent-emerald-500 rounded">
                                    Remove picked
                                </label>
                            </div>
                        </div>

                        <div class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-6">
                            <div class="flex items-center justify-between mb-4">
                                <h2 class="text-lg font-bold text-white flex items-center gap-2">
                                    <i class="fa-solid fa-check-circle text-emerald-400"></i>Picked Names
                                </h2>
                                <div class="flex items-center gap-2 px-3 py-1.5 bg-emerald-500/20 rounded-lg">
                                    <span class="text-emerald-400 font-bold text-sm" id="pickedCount">0</span>
                                    <span class="text-slate-400 text-sm">picked</span>
                                </div>
                            </div>
                            <textarea id="pickedTextarea" readonly rows="6" placeholder="Picked names will appear here..." class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:outline-none resize-none font-mono"></textarea>
                            
                            <div class="flex gap-2 mt-4">
                                <button id="copyPickedBtn" class="flex-1 px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl font-medium text-slate-300 hover:bg-white/10 transition-all">
                                    <i class="fa-solid fa-copy mr-2"></i>Copy
                                </button>
                                <button id="downloadPickedBtn" class="flex-1 px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl font-medium text-slate-300 hover:bg-white/10 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                                    <i class="fa-solid fa-download mr-2"></i>Download
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="statusBar" class="text-center text-slate-400 text-sm py-2">
                        Enter names and press Start
                    </div>
                </div>
            </main>

            <footer class="border-t border-white/5">
                <div class="container mx-auto px-6 py-6">
                    <div class="flex items-center justify-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center">
                            <i class="fa-solid fa-graduation-cap text-white text-sm"></i>
                        </div>
                        <span class="text-slate-400 text-sm">&copy; 2025 PrasertCBS. All rights reserved.</span>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <script>
        const els = {
            poolTA: document.getElementById('poolTextarea'),
            pickedTA: document.getElementById('pickedTextarea'),
            duration: document.getElementById('durationInput'),
            speed: document.getElementById('speedInput'),
            remove: document.getElementById('removeCheckbox'),
            start: document.getElementById('startBtn'),
            stop: document.getElementById('stopBtn'),
            shuffle: document.getElementById('shuffleBtn'),
            undo: document.getElementById('undoBtn'),
            reset: document.getElementById('resetBtn'),
            copyPicked: document.getElementById('copyPickedBtn'),
            downloadPicked: document.getElementById('downloadPickedBtn'),
            stage: document.getElementById('stageText'),
            status: document.getElementById('statusBar'),
            poolCount: document.getElementById('poolCount'),
            pickedCount: document.getElementById('pickedCount'),
        };

        const state = {
            pool: [],
            picked: [],
            spinning: false,
            intervalId: null,
            timeoutId: null,
            lastRemoved: null,
            get durationMs() {
                return clampNum(parseInt(els.duration.value, 10), 1, 60) * 1000;
            },
            get flipMs() {
                return clampNum(parseInt(els.speed.value, 10), 30, 300);
            },
        };

        function clampNum(n, min, max) {
            n = isFinite(n) ? n : min;
            return Math.min(Math.max(n, min), max);
        }

        function readPool() {
            const raw = els.poolTA.value
                .split(/\r?\n/)
                .map((s) => s.trim())
                .filter(Boolean);
            const seen = new Set();
            const out = [];
            for (const name of raw) {
                const k = name.toLowerCase();
                if (!seen.has(k)) {
                    seen.add(k);
                    out.push(name);
                }
            }
            state.pool = out;
            updateCounts();
            return out;
        }

        function writePool() {
            els.poolTA.value = state.pool.join('\n');
            updateCounts();
        }

        function formatTimestamp(date) {
            const d = date instanceof Date ? date : new Date(date);
            const pad = (n) => String(n).padStart(2, '0');
            const yyyy = d.getFullYear();
            const mm = pad(d.getMonth() + 1);
            const dd = pad(d.getDate());
            const hh = pad(d.getHours());
            const mi = pad(d.getMinutes());
            const ss = pad(d.getSeconds());
            return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
        }

        function writePicked() {
            const lines = state.picked.map(
                (entry, idx) => `${idx + 1}. [${formatTimestamp(entry.timestamp)}] ${entry.name}`
            );
            els.pickedTA.value = lines.join('\n');
            els.downloadPicked.disabled = state.picked.length === 0;
            updateCounts();
        }

        function updateCounts() {
            els.poolCount.textContent = state.pool.length;
            els.pickedCount.textContent = state.picked.length;
            els.start.disabled = state.spinning || state.pool.length === 0;
            els.stop.disabled = !state.spinning;
            els.undo.disabled = !state.lastRemoved || state.spinning;
        }

        function setStatus(msg) {
            els.status.textContent = msg;
        }

        function renderStage(text, winner = false) {
            els.stage.textContent = text || '—';
            els.stage.classList.remove('flip', 'winner');
            void els.stage.offsetWidth;
            els.stage.classList.add(winner ? 'winner' : 'flip');
            if (winner) {
                els.stage.classList.remove('text-emerald-400');
                els.stage.classList.add('text-emerald-300');
            } else {
                els.stage.classList.remove('text-emerald-300');
                els.stage.classList.add('text-emerald-400');
            }
        }

        function startSpin() {
            if (state.spinning) return;
            readPool();
            if (state.pool.length === 0) {
                setStatus('Enter at least one name.');
                return;
            }

            state.spinning = true;
            updateCounts();
            toggleEditing(false);
            setStatus('Spinning...');

            state.intervalId = setInterval(() => {
                const i = Math.floor(Math.random() * state.pool.length);
                renderStage(state.pool[i], false);
            }, state.flipMs);

            state.timeoutId = setTimeout(finalizePick, state.durationMs);
        }

        function finalizePick() {
            if (!state.spinning) return;
            clearInterval(state.intervalId);
            state.intervalId = null;

            const idx = Math.floor(Math.random() * state.pool.length);
            const winner = state.pool[idx];
            renderStage(winner, true);

            if (els.remove.checked) {
                const entry = { name: winner, timestamp: new Date() };
                state.lastRemoved = entry;
                state.pool.splice(idx, 1);
                writePool();
                state.picked.push(entry);
                writePicked();
            } else {
                state.lastRemoved = null;
            }

            state.spinning = false;
            updateCounts();
            toggleEditing(true);
            setStatus('Winner: ' + winner + (els.remove.checked ? ' (removed from pool)' : ''));
        }

        function stopSpin() {
            if (!state.spinning) return;
            clearTimeout(state.timeoutId);
            state.timeoutId = null;
            finalizePick();
        }

        function shufflePool() {
            readPool();
            for (let i = state.pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [state.pool[i], state.pool[j]] = [state.pool[j], state.pool[i]];
            }
            writePool();
            setStatus('List shuffled.');
        }

        function undoLast() {
            if (!state.lastRemoved) return;
            const entry = state.lastRemoved;
            state.lastRemoved = null;
            state.pool.push(entry.name);
            state.picked = state.picked.filter((record) => record !== entry);
            writePool();
            writePicked();
            updateCounts();
            setStatus(`Restored: ${entry.name}`);
        }

        function resetAll() {
            if (!confirm('Clear both lists and reset settings?')) return;
            state.pool = [];
            state.picked = [];
            state.lastRemoved = null;
            state.spinning = false;
            els.poolTA.value = '';
            els.duration.value = 4;
            els.speed.value = 300;
            els.remove.checked = true;
            renderStage('Ready');
            writePicked();
            updateCounts();
            setStatus('Reset complete.');
            toggleEditing(true);
        }

        function copyPicked() {
            navigator.clipboard
                .writeText(els.pickedTA.value)
                .then(() => setStatus('Copied to clipboard.'))
                .catch(() => setStatus('Copy failed.'));
        }

        function downloadPicked() {
            if (!state.picked.length) {
                setStatus('No picked names to download.');
                return;
            }
            const header = ['No', 'Timestamp', 'Name'];
            const rows = state.picked.map((entry, idx) => [
                idx + 1,
                formatTimestamp(entry.timestamp),
                entry.name,
            ]);
            const csv = [header, ...rows]
                .map((row) =>
                    row
                        .map((value) => `"${String(value ?? '').replace(/"/g, '""')}"`)
                        .join(',')
                )
                .join('\n');
            const bom = '\uFEFF';
            const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            const stamp = new Date().toISOString().slice(0, 10);
            link.download = `picked-names-${stamp}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            setStatus('Downloaded as CSV.');
        }

        function toggleEditing(enabled) {
            els.poolTA.readOnly = !enabled;
            els.shuffle.disabled = !enabled;
            els.reset.disabled = !enabled;
            els.copyPicked.disabled = !enabled && els.pickedTA.value.length === 0;
        }

        els.start.addEventListener('click', startSpin);
        els.stop.addEventListener('click', stopSpin);
        els.shuffle.addEventListener('click', shufflePool);
        els.undo.addEventListener('click', undoLast);
        els.reset.addEventListener('click', resetAll);
        els.copyPicked.addEventListener('click', copyPicked);
        els.downloadPicked.addEventListener('click', downloadPicked);

        els.poolTA.addEventListener('input', () => {
            readPool();
            setStatus('');
        });
        els.duration.addEventListener('change', () => {
            els.duration.value = clampNum(parseInt(els.duration.value, 10), 1, 60);
        });
        els.speed.addEventListener('change', () => {
            els.speed.value = clampNum(parseInt(els.speed.value, 10), 30, 300);
        });

        document.addEventListener('keydown', (e) => {
            const active = document.activeElement;
            const typing = active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT');
            if (typing) return;
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                if (state.spinning) stopSpin();
                else startSpin();
            }
        });

        readPool();
    </script>
</body>
</html>
