<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSeatingChart - PrasertCBS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .seat {
            transition: all 0.3s ease;
        }
        .seat.animating {
            animation: seat-pulse 0.3s ease-in-out;
        }
        @keyframes seat-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .progress-bar-animated {
            background: linear-gradient(90deg, #06b6d4 0%, #8b5cf6 50%, #06b6d4 100%);
            background-size: 200% 100%;
            animation: progress-shimmer 1.5s ease-in-out infinite;
        }
        @keyframes progress-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">
    <div class="relative overflow-hidden min-h-screen">
        <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950"></div>
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-cyan-500/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-500/20 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-cyan-500/10 rounded-full blur-3xl"></div>
        
        <div class="relative z-10">
            <nav class="container mx-auto px-6 py-6">
                <div class="flex items-center justify-center">
                    <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center shadow-lg shadow-brand-500/25">
                            <i class="fa-solid fa-graduation-cap text-white text-lg"></i>
                        </div>
                        <span class="text-xl font-bold text-white">PrasertCBS</span>
                    </a>
                </div>
            </nav>

            <header class="container mx-auto px-6 pt-4 pb-8 text-center">
                <h1 class="text-3xl md:text-5xl font-bold mb-3 leading-tight">
                    <span class="gradient-text">Seating Chart Generator</span>
                </h1>
                <p class="text-slate-400 max-w-xl mx-auto">Maximize distance between students with intelligent seat assignment.</p>
            </header>

            <main class="container mx-auto px-6 pb-16">
                <div class="max-w-5xl mx-auto space-y-6">
                    <div class="grid gap-6 lg:grid-cols-2">
                        <div class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-6">
                            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                <i class="fa-solid fa-sliders text-cyan-400"></i>Configuration
                            </h2>
                            
                            <div class="space-y-4">
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm text-slate-400 mb-2">Rows</label>
                                        <input type="number" id="rows" min="1" max="20" value="4" class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-4 py-2.5 text-slate-200 text-center focus:outline-none focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20 transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-sm text-slate-400 mb-2">Columns</label>
                                        <input type="number" id="cols" min="1" max="20" value="5" class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-4 py-2.5 text-slate-200 text-center focus:outline-none focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20 transition-all">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm text-slate-400 mb-2">Animation Duration: <span id="durationDisplay" class="text-cyan-400 font-semibold">5s</span></label>
                                    <input type="range" id="duration" min="3" max="10" value="5" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-cyan-500">
                                </div>
                                <label class="flex items-center gap-2 text-sm text-slate-400 cursor-pointer">
                                    <input type="checkbox" id="showSeatNumbers" checked onchange="toggleSeatNumbers()" class="w-4 h-4 accent-cyan-500 rounded">
                                    Show seat numbers
                                </label>
                            </div>
                        </div>

                        <div class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-6">
                            <div class="flex items-center justify-between mb-4">
                                <h2 class="text-lg font-bold text-white flex items-center gap-2">
                                    <i class="fa-solid fa-user-plus text-cyan-400"></i>Student Names
                                </h2>
                                <div class="flex items-center gap-2 px-3 py-1.5 bg-cyan-500/20 rounded-lg">
                                    <i class="fa-solid fa-users text-cyan-400 text-sm"></i>
                                    <span class="text-cyan-400 font-bold" id="studentCount">0</span>
                                </div>
                            </div>
                            <textarea id="students" rows="5" placeholder="Enter student names, one per line..." class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20 transition-all resize-none font-mono"></textarea>
                            
                            <div class="flex gap-3 mt-4">
                                <button id="generateBtn" onclick="generateSeatingChart()" class="flex-1 px-4 py-3 bg-gradient-to-r from-cyan-500 to-cyan-600 rounded-xl font-semibold text-white hover:shadow-lg hover:shadow-cyan-500/25 hover:-translate-y-0.5 transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0">
                                    <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>Generate
                                </button>
                                <button id="exportBtn" onclick="exportToCSV()" class="px-6 py-3 bg-white/5 border border-white/10 rounded-xl font-medium text-slate-300 hover:bg-white/10 transition-all hidden">
                                    <i class="fa-solid fa-download mr-2"></i>Export
                                </button>
                            </div>

                            <div id="progress" class="mt-4 hidden">
                                <div class="h-2 bg-slate-700 rounded-full overflow-hidden">
                                    <div id="progressBar" class="h-full progress-bar-animated rounded-full" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-bold text-white flex items-center gap-2">
                                <i class="fa-solid fa-chair text-cyan-400"></i>Seating Chart
                            </h2>
                            <div id="warning" class="hidden px-3 py-1.5 bg-amber-500/20 border border-amber-500/30 rounded-lg text-amber-300 text-sm"></div>
                        </div>
                        <div id="seatingChart" class="flex items-center justify-center min-h-[300px]">
                            <div class="text-center text-slate-500">
                                <i class="fa-solid fa-chair text-4xl mb-3 opacity-30"></i>
                                <p>Configure and generate a seating chart</p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <footer class="border-t border-white/5">
                <div class="container mx-auto px-6 py-6">
                    <div class="flex items-center justify-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center">
                            <i class="fa-solid fa-graduation-cap text-white text-sm"></i>
                        </div>
                        <span class="text-slate-400 text-sm">&copy; 2025 PrasertCBS. All rights reserved.</span>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <script>
        let animationInterval;
        let isAnimating = false;

        document.getElementById('duration').addEventListener('input', function() {
            document.getElementById('durationDisplay').textContent = `${this.value}s`;
        });

        function parseStudents(textareaInput) {
            return textareaInput
                .split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0)
                .map(line => {
                    const parts = line.split(/\t|,|\||;|:| - /).map(p => p.trim()).filter(p => p.length > 0);
                    if (parts.length > 1) {
                        const id = parts[0];
                        const name = parts.slice(1).join(', ');
                        return { id, name };
                    }
                    return { id: null, name: line };
                });
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function createGrid(rows, cols) {
            const seatingChart = document.getElementById('seatingChart');
            seatingChart.innerHTML = '';

            const grid = document.createElement('div');
            grid.className = 'grid gap-3 w-full';
            grid.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;

            for (let i = 0; i < rows * cols; i++) {
                const seat = document.createElement('div');
                seat.className = 'seat relative bg-slate-800/50 border-2 border-cyan-500/30 rounded-xl p-4 text-center font-medium min-h-[60px] flex items-center justify-center';
                seat.id = `seat-${i}`;

                const seatNumber = document.createElement('div');
                seatNumber.className = 'seat-number absolute top-1 left-2 text-xs text-slate-500 font-normal';
                seatNumber.textContent = `#${i + 1}`;
                seatNumber.style.display = document.getElementById('showSeatNumbers').checked ? 'block' : 'none';
                seat.appendChild(seatNumber);

                grid.appendChild(seat);
            }

            seatingChart.appendChild(grid);
            return grid;
        }

        function assignSeats(students, totalSeats) {
            const rows = parseInt(document.getElementById('rows').value);
            const cols = parseInt(document.getElementById('cols').value);

            const assignments = new Array(totalSeats).fill(null).map(() => ({ id: null, name: 'Empty' }));

            if (students.length === 0 || totalSeats === 0) {
                return assignments;
            }

            const studentCount = Math.min(students.length, totalSeats);
            const shuffledStudents = shuffleArray([...students]);

            const oddSeats = [];
            const evenSeats = [];

            for (let i = 0; i < totalSeats; i++) {
                if (i % 2 === 0) {
                    evenSeats.push(i);
                } else {
                    oddSeats.push(i);
                }
            }

            let studentIndex = 0;

            for (let i = 0; i < oddSeats.length && studentIndex < studentCount; i++) {
                assignments[oddSeats[i]] = shuffledStudents[studentIndex];
                studentIndex++;
            }

            for (let i = 0; i < evenSeats.length && studentIndex < studentCount; i++) {
                assignments[evenSeats[i]] = shuffledStudents[studentIndex];
                studentIndex++;
            }

            return assignments;
        }

        function updateSeatingDisplay(assignments) {
            assignments.forEach((entry, index) => {
                const seat = document.getElementById(`seat-${index}`);
                if (seat) {
                    const seatNumber = seat.querySelector('.seat-number');
                    seat.innerHTML = '';

                    if (seatNumber) {
                        seat.appendChild(seatNumber);
                    }

                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = entry.name;
                    nameSpan.className = 'text-sm truncate';
                    seat.appendChild(nameSpan);

                    seat.dataset.studentId = entry.id || '';

                    if (entry.name === 'Empty') {
                        seat.className = 'seat relative bg-slate-800/30 border border-slate-700/50 rounded-xl p-4 text-center font-medium min-h-[60px] flex items-center justify-center text-slate-500';
                    } else {
                        seat.className = 'seat relative bg-gradient-to-br from-cyan-500/20 to-cyan-600/10 border-2 border-cyan-500/50 rounded-xl p-4 text-center font-medium min-h-[60px] flex items-center justify-center text-white shadow-lg shadow-cyan-500/10';
                    }

                    if (isAnimating) {
                        seat.classList.add('animating');
                    }
                }
            });
        }

        function toggleSeatNumbers() {
            const showNumbers = document.getElementById('showSeatNumbers').checked;
            document.querySelectorAll('.seat-number').forEach(seatNumber => {
                seatNumber.style.display = showNumbers ? 'block' : 'none';
            });
        }

        function exportToCSV() {
            const seats = document.querySelectorAll('.seat');
            if (seats.length === 0) {
                showWarning('Please generate a seating chart first.');
                return;
            }

            const hasIds = Array.from(seats).some(seat => seat.dataset && seat.dataset.studentId && seat.dataset.studentId.trim() !== '');

            const csvData = [];
            if (hasIds) {
                csvData.push(['Seat Number', 'ID', 'Student Name']);
            } else {
                csvData.push(['Seat Number', 'Student Name']);
            }

            seats.forEach((seat, index) => {
                const seatNumber = index + 1;
                const studentNameSpan = seat.querySelector('span');
                const studentName = studentNameSpan ? studentNameSpan.textContent : '';
                const studentId = seat.dataset ? (seat.dataset.studentId || '') : '';

                if (studentName && studentName !== 'Empty') {
                    if (hasIds) {
                        csvData.push([seatNumber, studentId, studentName]);
                    } else {
                        csvData.push([seatNumber, studentName]);
                    }
                }
            });

            const csvContent = csvData.map(row =>
                row.map(field => `"${field.toString().replace(/"/g, '""')}"`).join(',')
            ).join('\n');

            const bom = '\uFEFF';
            const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', 'seating-chart.csv');
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function animateShuffle(students, duration) {
            const totalSeats = students.totalSeats;
            const studentNames = students.names;
            let startTime = Date.now();
            let shuffledStudents = [...studentNames];

            const progress = document.getElementById('progress');
            const progressBar = document.getElementById('progressBar');
            progress.classList.remove('hidden');

            isAnimating = true;

            animationInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const progressPercent = Math.min((elapsed / (duration * 1000)) * 100, 100);
                progressBar.style.width = `${progressPercent}%`;

                if (elapsed >= duration * 1000) {
                    clearInterval(animationInterval);
                    isAnimating = false;
                    progress.classList.add('hidden');
                    progressBar.style.width = '0%';

                    const finalAssignments = assignSeats(shuffledStudents, totalSeats);
                    updateSeatingDisplay(finalAssignments);

                    document.getElementById('generateBtn').disabled = false;
                    document.getElementById('generateBtn').innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i>Generate';
                    document.getElementById('exportBtn').classList.remove('hidden');
                    return;
                }

                shuffledStudents = shuffleArray(studentNames);
                const assignments = assignSeats(shuffledStudents, totalSeats);
                updateSeatingDisplay(assignments);
            }, 300);
        }

        function showWarning(message) {
            const warning = document.getElementById('warning');
            warning.textContent = message;
            warning.classList.remove('hidden');
            setTimeout(() => {
                warning.classList.add('hidden');
            }, 5000);
        }

        function generateSeatingChart() {
            if (isAnimating) {
                clearInterval(animationInterval);
                isAnimating = false;
                document.getElementById('progress').classList.add('hidden');
            }

            const rows = parseInt(document.getElementById('rows').value);
            const cols = parseInt(document.getElementById('cols').value);
            const duration = parseInt(document.getElementById('duration').value);
            const studentsInput = document.getElementById('students').value;

            if (!rows || !cols || rows < 1 || cols < 1) {
                showWarning('Please enter valid numbers for rows and columns.');
                return;
            }

            if (duration < 3 || duration > 10) {
                showWarning('Animation duration must be between 3 and 10 seconds.');
                return;
            }

            const studentNames = parseStudents(studentsInput);
            const totalSeats = rows * cols;

            if (studentNames.length === 0) {
                showWarning('Please enter at least one student name.');
                return;
            }

            if (studentNames.length > totalSeats) {
                showWarning(`${studentNames.length} students but only ${totalSeats} seats.`);
                studentNames.splice(totalSeats);
            }

            document.getElementById('studentCount').textContent = studentNames.length;

            createGrid(rows, cols);

            document.getElementById('generateBtn').disabled = true;
            document.getElementById('generateBtn').innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Generating...';
            document.getElementById('exportBtn').classList.add('hidden');

            animateShuffle({
                names: studentNames,
                totalSeats: totalSeats
            }, duration);
        }

        window.addEventListener('load', function() {
            document.getElementById('students').value = `Alice Johnson
Bob Smith
Carol Davis
David Wilson
Emma Brown
Frank Miller
Grace Taylor
Henry Anderson
Ivy Thomas
Jack White
Kate Green
Liam Clark
Mia Hall
Noah Young
Olivia King
Paul Wright
Quinn Lee
Ruby Scott
Sam Turner
Tina Adams`;

            const initialStudents = parseStudents(document.getElementById('students').value);
            document.getElementById('studentCount').textContent = initialStudents.length;
        });
    </script>
</body>
</html>
