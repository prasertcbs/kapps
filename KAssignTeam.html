<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAssignTeam - PrasertCBS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .name-card {
            transition: all 0.3s ease;
        }
        .team-color-0 { background: linear-gradient(135deg, rgba(251, 113, 133, 0.2) 0%, rgba(251, 113, 133, 0.1) 100%); border-color: rgba(251, 113, 133, 0.4); }
        .team-color-1 { background: linear-gradient(135deg, rgba(147, 197, 253, 0.2) 0%, rgba(147, 197, 253, 0.1) 100%); border-color: rgba(147, 197, 253, 0.4); }
        .team-color-2 { background: linear-gradient(135deg, rgba(167, 243, 208, 0.2) 0%, rgba(167, 243, 208, 0.1) 100%); border-color: rgba(167, 243, 208, 0.4); }
        .team-color-3 { background: linear-gradient(135deg, rgba(253, 230, 138, 0.2) 0%, rgba(253, 230, 138, 0.1) 100%); border-color: rgba(253, 230, 138, 0.4); }
        .team-color-4 { background: linear-gradient(135deg, rgba(196, 181, 253, 0.2) 0%, rgba(196, 181, 253, 0.1) 100%); border-color: rgba(196, 181, 253, 0.4); }
        .team-color-5 { background: linear-gradient(135deg, rgba(248, 180, 219, 0.2) 0%, rgba(248, 180, 219, 0.1) 100%); border-color: rgba(248, 180, 219, 0.4); }
        .team-color-6 { background: linear-gradient(135deg, rgba(254, 202, 202, 0.2) 0%, rgba(254, 202, 202, 0.1) 100%); border-color: rgba(254, 202, 202, 0.4); }
        .team-color-7 { background: linear-gradient(135deg, rgba(186, 230, 253, 0.2) 0%, rgba(186, 230, 253, 0.1) 100%); border-color: rgba(186, 230, 253, 0.4); }
        .team-color-8 { background: linear-gradient(135deg, rgba(187, 247, 208, 0.2) 0%, rgba(187, 247, 208, 0.1) 100%); border-color: rgba(187, 247, 208, 0.4); }
        .team-color-9 { background: linear-gradient(135deg, rgba(250, 232, 255, 0.2) 0%, rgba(250, 232, 255, 0.1) 100%); border-color: rgba(250, 232, 255, 0.4); }
        .team-label-0 { color: #fb7185; }
        .team-label-1 { color: #93c5fd; }
        .team-label-2 { color: #a7f3d0; }
        .team-label-3 { color: #fde68a; }
        .team-label-4 { color: #c4b5fd; }
        .team-label-5 { color: #f8b4d9; }
        .team-label-6 { color: #fca5a5; }
        .team-label-7 { color: #7dd3fc; }
        .team-label-8 { color: #86efac; }
        .team-label-9 { color: #e9d5ff; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">
    <div class="relative overflow-hidden min-h-screen">
        <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950"></div>
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-pink-500/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-500/20 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-pink-500/10 rounded-full blur-3xl"></div>
        
        <div class="relative z-10">
            <nav class="container mx-auto px-6 py-6">
                <div class="flex items-center justify-center">
                    <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center shadow-lg shadow-brand-500/25">
                            <i class="fa-solid fa-graduation-cap text-white text-lg"></i>
                        </div>
                        <span class="text-xl font-bold text-white">PrasertCBS</span>
                    </a>
                </div>
            </nav>

            <header class="container mx-auto px-6 pt-4 pb-8 text-center">
                <h1 class="text-3xl md:text-5xl font-bold mb-3 leading-tight">
                    <span class="gradient-text">Team Assignment</span>
                </h1>
                <p class="text-slate-400 max-w-xl mx-auto">Quickly generate and manage balanced student teams with random assignment.</p>
            </header>

            <main class="container mx-auto px-6 pb-16">
                <div class="max-w-5xl mx-auto space-y-6">
                    
                    <div class="grid gap-6 lg:grid-cols-3">
                        <div class="lg:col-span-2 bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-6">
                            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                <i class="fa-solid fa-users text-pink-400"></i>Student Data
                            </h2>
                            <textarea id="studentText" rows="6" placeholder="Enter student data (ID, Name per line)...&#10;12345, John Doe&#10;67890, Jane Smith" class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-pink-500/50 focus:ring-2 focus:ring-pink-500/20 transition-all resize-none font-mono"></textarea>
                            
                            <div class="mt-4">
                                <label class="block text-sm text-slate-400 mb-2">
                                    <i class="fa-solid fa-file-csv mr-1"></i>Or upload CSV file
                                </label>
                                <input type="file" id="fileInput" accept=".csv" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-pink-500/20 file:text-pink-300 hover:file:bg-pink-500/30 file:cursor-pointer file:transition-colors"/>
                            </div>
                        </div>

                        <div class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-6">
                            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                <i class="fa-solid fa-gear text-pink-400"></i>Settings
                            </h2>
                            
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm text-slate-400 mb-2">Number of Groups</label>
                                    <input type="number" id="groupCount" min="2" max="20" value="3" class="w-full bg-slate-800/50 border border-white/10 rounded-xl px-4 py-3 text-slate-200 text-center focus:outline-none focus:border-pink-500/50 focus:ring-2 focus:ring-pink-500/20 transition-all">
                                </div>
                                
                                <button id="assignBtn" onclick="randomizeGroups()" class="w-full px-4 py-3 bg-gradient-to-r from-pink-500 to-pink-600 rounded-xl font-semibold text-white hover:shadow-lg hover:shadow-pink-500/25 hover:-translate-y-0.5 transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0">
                                    <i class="fa-solid fa-shuffle mr-2"></i>Assign Groups
                                </button>
                                
                                <button id="downloadBtn" onclick="downloadCSV()" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl font-medium text-slate-300 hover:bg-white/10 transition-all hidden">
                                    <i class="fa-solid fa-download mr-2"></i>Download CSV
                                </button>
                            </div>

                            <div id="statusBar" class="mt-4 pt-4 border-t border-white/5 text-center text-sm text-slate-400">
                                Enter student data to begin
                            </div>
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-xl rounded-2xl border border-white/5 p-6">
                        <h2 class="text-lg font-bold text-white mb-6 flex items-center gap-2">
                            <i class="fa-solid fa-people-group text-pink-400"></i>Assigned Teams
                        </h2>
                        <div id="result" class="space-y-4">
                            <div class="text-center text-slate-500 py-8">
                                <i class="fa-solid fa-users text-4xl mb-3 opacity-30"></i>
                                <p>Configure settings and click "Assign Groups" to generate teams</p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <footer class="border-t border-white/5">
                <div class="container mx-auto px-6 py-6">
                    <div class="flex items-center justify-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center">
                            <i class="fa-solid fa-graduation-cap text-white text-sm"></i>
                        </div>
                        <span class="text-slate-400 text-sm">&copy; 2025 PrasertCBS. All rights reserved.</span>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <script>
        let groups = [];
        let groupData = [];
        let students = [];

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                document.getElementById('studentText').value = evt.target.result;
            };
            reader.readAsText(file);
        });

        function parseInput() {
            const text = document.getElementById('studentText').value.trim();
            if (text) {
                const firstLine = text.split('\n')[0];
                const hasTabs = firstLine.includes('\t');
                const hasCommas = firstLine.includes(',');

                let parsedData = text
                    .split('\n')
                    .map(row => {
                        const separator = hasTabs ? '\t' : ',';
                        return row.split(separator).map(field => field.trim());
                    })
                    .filter(arr => arr.length >= 1 && arr[0]);

                if (parsedData.every(row => row.length === 1)) {
                    parsedData = parsedData.map((row, index) => [String(index + 1), row[0]]);
                } else {
                    parsedData = parsedData.filter(arr => arr.length >= 2 && arr[0] && arr[1]);
                }

                return parsedData;
            }
            return [];
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function balancedGroups(studentsArr, nGroups) {
            let total = studentsArr.length;
            let baseSize = Math.floor(total / nGroups);
            let extras = total % nGroups;
            let result = [];
            let idx = 0;
            for (let g = 0; g < nGroups; g++) {
                let thisGroupSize = baseSize + (g < extras ? 1 : 0);
                let thisGroup = studentsArr.slice(idx, idx + thisGroupSize);
                result.push(thisGroup);
                idx += thisGroupSize;
            }
            return result;
        }

        function buildSkeleton(groupsCount, studentsArr) {
            let html = '';
            let balanced = balancedGroups(studentsArr, groupsCount);
            balanced.forEach((grp, i) => {
                const colorClass = `team-color-${i % 10}`;
                const labelClass = `team-label-${i % 10}`;
                html += `
                    <div class="rounded-xl border-2 p-4 ${colorClass}">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="text-lg font-bold ${labelClass}">Group ${i + 1}</span>
                            <span class="text-sm text-slate-400">${grp.length} members</span>
                        </div>
                        <div class="flex flex-wrap gap-2">`;
                grp.forEach((_, j) => {
                    html += `<div class="name-card bg-slate-800/50 border border-white/10 rounded-lg px-4 py-2 text-sm" id="card-${i}-${j}">
                        <span class="text-slate-400">...</span>
                    </div>`;
                });
                html += `</div></div>`;
            });
            document.getElementById('result').innerHTML = html;
        }

        function animateCards(assignedGroups, studentsArr) {
            let cards = [];
            assignedGroups.forEach((grp, gi) => {
                grp.forEach((stu, si) => {
                    cards.push({gid: gi, sid: si, final: stu});
                });
            });
            cards.forEach((card, idx) => {
                let elem = document.getElementById(`card-${card.gid}-${card.sid}`);
                let duration = 1500 + Math.random() * 500;
                let interval = 75;
                let spins = setInterval(() => {
                    let randIdx = Math.floor(Math.random() * studentsArr.length);
                    elem.innerHTML = `<span class="text-slate-200">${studentsArr[randIdx][1]}</span><br><span class="text-xs text-slate-500">${studentsArr[randIdx][0]}</span>`;
                    elem.style.opacity = '0.7';
                }, interval);
                setTimeout(() => {
                    clearInterval(spins);
                    elem.innerHTML = `<span class="text-white font-medium">${card.final[1]}</span><br><span class="text-xs text-slate-400">${card.final[0]}</span>`;
                    elem.style.opacity = '1';
                    elem.classList.add('border-pink-500/30');
                }, duration);
            });
        }

        function setStatus(msg) {
            document.getElementById('statusBar').textContent = msg;
        }

        function randomizeGroups() {
            students = parseInput();
            const nGroups = parseInt(document.getElementById('groupCount').value, 10);
            if (!students.length) {
                setStatus('Please enter student data');
                return;
            }
            if (nGroups < 2) {
                setStatus('Minimum 2 groups required');
                return;
            }
            if (nGroups > students.length) {
                setStatus('More groups than students');
                return;
            }
            if (nGroups > 20) {
                setStatus('Maximum 20 groups allowed');
                return;
            }

            document.getElementById('assignBtn').disabled = true;
            setStatus('Assigning teams...');
            
            shuffleArray(students);
            groups = balancedGroups(students, nGroups);
            groupData = [];
            buildSkeleton(nGroups, students);
            
            setTimeout(() => animateCards(groups, students), 100);
            setTimeout(() => {
                groups.forEach((grp, i) => {
                    grp.forEach(stu => {
                        groupData.push({group: i + 1, id: stu[0], name: stu[1]});
                    });
                });
                document.getElementById('downloadBtn').classList.remove('hidden');
                document.getElementById('assignBtn').disabled = false;
                setStatus(`${students.length} students assigned to ${nGroups} teams`);
            }, 2200);
        }

        function downloadCSV() {
            if (!groupData.length) return;
            const rows = [['Group', 'ID', 'Name'], ...groupData.map(row => [row.group, row.id, row.name])];
            const csvContent = rows.map(row => row.join(',')).join('\n');
            const utf8BOM = '\uFEFF';
            const blob = new Blob([utf8BOM + csvContent], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'group_assignments.csv';
            a.click();
            URL.revokeObjectURL(url);
            setStatus('CSV downloaded');
        }
    </script>
</body>
</html>
